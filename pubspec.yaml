name: chatsphere
description: Realtime Chat Application with Live Presence System

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2
  firebase_messaging: ^15.1.6
  flutter_local_notifications: ^18.0.1
  image_picker: ^1.0.7
  file_picker: ^8.1.2
  video_player: ^2.8.2
  provider: ^6.1.1
  cached_network_image: ^3.3.1
  intl: ^0.19.0
  path: ^1.9.0
  uuid: ^4.3.3
  timeago: ^3.6.1
  url_launcher: ^6.2.5
  flutter_webrtc: ^0.12.4
  audioplayers: ^6.1.0
  permission_handler: ^11.3.0
  supabase_flutter: ^2.14.1
  record: ^6.2.1
  emoji_picker_flutter: ^4.4.0
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/audio/