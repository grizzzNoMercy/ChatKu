pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        def propertiesFile = new File(rootDir.absolutePath + "/local.properties")
        if (propertiesFile.exists()) {
            propertiesFile.withInputStream { stream -> properties.load(stream) }
        }
        def flutterSdkPath = properties.getProperty('flutter.sdk')
        if (!flutterSdkPath) {
            throw new GradleException('flutter.sdk not defined in local.properties')
        }
        return flutterSdkPath
    }.call()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.9.1" apply false
    id "org.jetbrains.kotlin.android" version "2.1.0" apply false
    id "com.google.gms.google-services" version "4.4.2" apply false  // ← tambahkan ini
}
include ':app'